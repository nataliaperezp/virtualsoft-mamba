# =============================================================================
# cloudbuild.yaml — Build y push de la imagen a GCR
# Se ejecuta en la nube: evita problemas de compilación CUDA en Mac M-series
# =============================================================================
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--platform=linux/amd64'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mamba-trainer-contrastive:v3'
      - '.'
    timeout: '600s'

images:
  - 'gcr.io/$PROJECT_ID/mamba-trainer-contrastive:v3'

timeout: '900s'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
